name: deploy
on:
  push:
    tags: ['v*']
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/webapps-deploy@v3
        with:
          app-name: RIVALYZE-APP-NAME   # Anupam fills Friday
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      - run: |
          for i in $(seq 1 10); do curl -sf https://APP.azurewebsites.net/api/v1/health && exit 0; sleep 10; done; exit 1
