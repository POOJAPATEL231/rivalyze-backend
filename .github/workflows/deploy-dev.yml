name: deploy-dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  ACR_LOGIN_SERVER: rivalyzeregistry.azurecr.io
  ACR_REPOSITORY: rivalyze-backend
  AZURE_RESOURCE_GROUP: rg-rivalyze-cin-01
  AZURE_WEBAPP_NAME: rivalyze-backend-webapp-cin-01

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: docker/setup-buildx-action@v3

      - name: ACR login
        run: az acr login -n rivalyzeregistry

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:latest
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy image to Web App
        run: |
          az webapp config container set \
            -g ${{ env.AZURE_RESOURCE_GROUP }} \
            -n ${{ env.AZURE_WEBAPP_NAME }} \
            --container-image-name ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:${{ github.sha }}
          az webapp restart \
            -g ${{ env.AZURE_RESOURCE_GROUP }} \
            -n ${{ env.AZURE_WEBAPP_NAME }}

      - name: Smoke test
        env:
          APP_HEALTH_URL: ${{ secrets.APP_HEALTH_URL }}
        run: |
          for i in $(seq 1 15); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$APP_HEALTH_URL")
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 15
          done
          echo "smoke test failed"
          exit 1
