name: ci
on:
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r requirements.txt ruff pytest bandit pip-audit
      - run: ruff check .
      - run: bandit -r app -ll            # SAST: fail on medium+ severity
      - run: pip-audit                     # dependency CVE scan
      - run: MOCK_MODE=1 pytest -q
